<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>离线中 - MoYun</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fdf6e3;
        color: #2d2d2d;
        font-family: "Ma Shan Zheng", "Noto Sans SC", sans-serif;
      }
      .card {
        width: min(92vw, 440px);
        border: 2px dashed #c4b5a0;
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        background: rgba(255, 255, 255, 0.65);
      }
      h1 { margin: 0 0 10px; font-size: 28px; font-weight: 400; }
      p { margin: 0; color: #666; font-size: 16px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>当前离线</h1>
      <p>网络恢复后可继续搜索与播放。</p>
    </main>
  </body>
</html>
